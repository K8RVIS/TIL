name: Daily Scrum Slack Notification

on:
  schedule:
    - cron: '0 13 * * 1,3,5' # 매주 월,수,금 오후 10시 KST (UTC 13:00)

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Daily Scrum Reminder to Slack
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": " *데일리 스크럼 시간입니다!* (오후 10시)",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "데일리 스크럼",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "안녕하세요! 오늘의 데일리 스크럼을 작성해주세요 :wave:\n아래 양식을 복사해서 사용하세요."
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "```데일리 스크럼 양식\n\n 이름:\n\n 어제 한 일:\n-\n\n 오늘 할 일:\n-\n\n 블로커 / 이슈:\n-\n\n 공유 사항:\n-```"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "매주 월,수,금 오후 10시 자동 발송"
                    }
                  ]
                }
              ]
            }'
